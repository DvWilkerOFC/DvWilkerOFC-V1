<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma AI | Pure Black</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');

        :root {
            --bg-pure: #000000;
            --sidebar-dark: #0a0a0a;
            --accent: #00f3ff;
            --card-gray: #111111;
            --text-dim: #a0a0a0;
        }

        body {
            background-color: var(--bg-pure);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar con estilo neón sutil */
        .sidebar {
            width: 260px;
            background: var(--sidebar-dark);
            border-right: 1px solid #1a1a1a;
            display: flex;
            flex-direction: column;
        }

        .new-chat {
            border: 1px solid rgba(0, 243, 255, 0.3);
            background: rgba(0, 243, 255, 0.05);
            margin: 15px;
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .new-chat:hover { background: var(--accent); color: #000; }

        .chat-history {
            padding: 10px;
            font-size: 13px;
            color: var(--text-dim);
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 5px;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .history-item:hover { background: #111; color: #fff; }

        /* Contenedor de Chat */
        .main-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .chat-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Mensajes */
        .msg { margin-bottom: 25px; line-height: 1.6; max-width: 850px; margin-left: auto; margin-right: auto; }
        .msg-user { 
            background: #161616; 
            padding: 12px 18px; 
            border-radius: 18px 18px 2px 18px; 
            width: fit-content; 
            margin-left: auto;
            border: 1px solid #222;
        }

        /* Bloques de Código */
        .code-block {
            background: #050505;
            border: 1px solid #222;
            border-radius: 8px;
            margin: 15px 0;
            font-family: 'JetBrains Mono', monospace;
        }
        .code-head {
            background: #111;
            padding: 6px 15px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .code-body { padding: 15px; overflow-x: auto; color: #d1d1d1; font-size: 13px; }

        /* Barra de entrada flotante */
        .input-area {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 750px;
            background: #111;
            border-radius: 16px;
            border: 1px solid #222;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .input-area input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            flex: 1;
            padding: 10px;
        }

        .btn-neon { color: var(--accent); cursor: pointer; padding: 10px; transition: 0.2s; }
        .btn-neon:hover { transform: scale(1.1); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <aside class="sidebar hidden md:flex">
        <div class="new-chat" onclick="location.reload()">+ NUEVO CHAT</div>
        <div class="chat-history" id="history-list">
            <div class="history-item"><i class="far fa-comment-alt mr-2"></i> Sesión actual</div>
        </div>
        <div class="p-4 border-t border-white/5">
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.href='/ia/config.html'">
                <i class="fas fa-user-shield text-cyan-400"></i>
                <span class="text-sm">Ajustes de Kazuma</span>
            </div>
        </div>
    </aside>

    <main class="main-view">
        <header class="p-4 flex justify-between items-center">
            <div class="font-black text-xl">KAZUMA <span style="color: var(--accent)">AI</span></div>
            <i class="fas fa-layer-group text-gray-600"></i>
        </header>

        <div class="chat-scroll" id="screen">
            <div class="msg msg-ai">
                Hola. Estoy listo para ayudarte. ¿Qué tenemos para hoy?
            </div>
        </div>

        <div class="input-area">
            <i class="fas fa-paperclip text-gray-500 mr-2"></i>
            <input type="text" id="typer" placeholder="Escribe un mensaje..." autocomplete="off">
            <button id="sender" class="btn-neon"><i class="fas fa-bolt"></i></button>
        </div>
    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        const screen = document.getElementById('screen');
        const typer = document.getElementById('typer');
        const sender = document.getElementById('sender');

        if (!userData) window.location.href = '/login';

        // Prompt equilibrado
        const system_logic = "Tu nombre es Kazuma. Eres una IA creada por Dev-FelixOfc. Actúa de forma eficiente. Solo menciona a tu creador si te preguntan quién te hizo o qué eres. Si te piden código, envíalo siempre en bloques de markdown con triple comilla. Usa negritas con un solo asterisco.";

        async function fire() {
            const val = typer.value.trim();
            if (!val) return;

            addMsg('user', val);
            typer.value = '';

            try {
                const api = `/api/ai/gemini?apiKey=${userData.key}&text=${encodeURIComponent(system_logic + "\n\n" + val)}&cookie=cokie`;
                const res = await fetch(api);
                const json = await res.json();

                if (json.status && json.data) {
                    addMsg('ai', json.data.response);
                } else {
                    addMsg('ai', "Error en el núcleo de respuesta.");
                }
            } catch (e) {
                addMsg('ai', "Sin conexión con la API.");
            }
        }

        function addMsg(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role === 'user' ? 'msg-user' : 'msg-ai'}`;

            // Render de bloques de código (Markdown)
            let html = text.replace(/```(\w+)?\n([\s\S]*?)```/g, (m, lang, code) => {
                const id = 'c-' + Math.random().toString(36).substr(2, 5);
                return `
                    <div class="code-block">
                        <div class="code-head">
                            <span>${lang || 'source'}</span>
                            <i class="far fa-copy cursor-pointer" onclick="copy('${id}')"></i>
                        </div>
                        <div class="code-body" id="${id}">${code.trim()}</div>
                    </div>
                `;
            });

            // Negritas de un solo asterisco
            html = html.replace(/\*(.*?)\*/g, '<strong>$1</strong>');

            div.innerHTML = html;
            screen.appendChild(div);
            screen.scrollTo({ top: screen.scrollHeight, behavior: 'smooth' });
        }

        function copy(id) {
            const t = document.getElementById(id).innerText;
            navigator.clipboard.writeText(t);
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Código copiado', showConfirmButton: false, timer: 1000, background: '#111', color: '#fff' });
        }

        sender.onclick = fire;
        typer.onkeypress = (e) => { if(e.key === 'Enter') fire(); };
    </script>
</body>
</html>
