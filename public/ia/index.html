<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kazuma IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #00f2ff44;
        }

        .menu-btn, .settings-btn {
            background: transparent;
            border: 1px solid #00f2ff;
            color: #00f2ff;
            padding: 8px 12px;
            border-radius: 8px;
            box-shadow: 0 0 10px #00f2ff55;
            cursor: pointer;
        }

        h1 {
            font-size: 1.2rem;
            color: #00f2ff;
            text-shadow: 0 0 10px #00f2ff;
            font-weight: bold;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero-title {
            font-size: 2rem;
            color: #00f2ff33;
            margin-bottom: 10px;
        }

        .hero-desc {
            color: #444;
            max-width: 250px;
            line-height: 1.5;
        }

        .chat-container {
            width: 100%;
            padding: 15px;
            background: #000;
        }

        .input-area {
            display: flex;
            align-items: center;
            gap: 10px;
            max-width: 800px;
            margin: 0 auto;
        }

        .action-btn {
            background: transparent;
            border: 1px solid #00f2ff;
            color: #00f2ff;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            box-shadow: 0 0 8px #00f2ff66;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn:active {
            transform: scale(0.9);
            box-shadow: 0 0 15px #00f2ff;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        input[type="text"] {
            width: 100%;
            background: transparent;
            border: 1px solid #00f2ff;
            border-radius: 12px;
            padding: 14px 15px;
            color: #fff;
            outline: none;
            box-shadow: inset 0 0 5px #00f2ff44;
        }

        input[type="text"]::placeholder {
            color: #555;
        }

        .send-btn {
            background: transparent;
            border: 1px solid #00f2ff;
            color: #00f2ff;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            box-shadow: 0 0 8px #00f2ff66;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <button class="menu-btn"><i class="fas fa-bars"></i></button>
        <h1>Kazuma IA</h1>
        <button class="settings-btn"><i class="fas fa-cog"></i></button>
    </header>

    <main>
        <div class="hero-title">Kazuma IA</div>
        <p class="hero-desc">Inicia una conversación. Tus chats se guardan automáticamente.</p>
    </main>

    <div class="chat-container">
        <div class="input-area">
            <button class="action-btn">
                <i class="fas fa-paperclip"></i>
            </button>
            
            <div class="input-wrapper">
                <input type="text" placeholder="Hola">
            </div>

            <button class="action-btn">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

</body>
</html>
