<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IA Kazuma | Beta</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --dark-bg: #09090b; 
            --card-bg: #11111d; 
            --text-main: #ffffff; 
            --code-bg: #05050a;
            --sent-msg: #005c4b;
            --received-msg: #202c33;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background-color: var(--dark-bg); color: var(--text-main); }

        .app-container { display: flex; height: 100vh; width: 100vw; position: relative; }

        /* SIDEBAR / MENU */
        #sidebar {
            width: 280px;
            background: var(--card-bg);
            border-right: 1px solid rgba(0, 243, 255, 0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: absolute;
            z-index: 100;
            height: 100%;
            transform: translateX(-100%);
        }
        #sidebar.open { transform: translateX(0); }

        /* CHAT AREA */
        .chat-main { flex-grow: 1; display: flex; flex-direction: column; position: relative; width: 100%; }

        header { 
            padding: 15px; 
            background: rgba(12, 12, 20, 0.9); 
            backdrop-filter: blur(10px); 
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        #chat-messages {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background-image: radial-gradient(circle at 50% 50%, #11111d 0%, #09090b 100%);
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            position: relative;
        }
        .received { background: var(--received-msg); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(255,255,255,0.05); }
        .sent { background: var(--sent-msg); align-self: flex-end; border-bottom-right-radius: 2px; }

        /* FORMATO DE MENSAJES */
        .msg b, .msg strong { color: var(--neon-blue); font-weight: bold; }
        pre {
            background: var(--code-bg);
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
            overflow-x: auto;
            border: 1px solid rgba(0,243,255,0.2);
            position: relative;
        }
        code { font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .copy-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        /* INPUT AREA */
        .input-area { background: var(--card-bg); padding: 15px; display: flex; gap: 10px; align-items: center; }
        input {
            flex-grow: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0,243,255,0.2);
            padding: 12px 18px;
            border-radius: 25px;
            color: white;
            outline: none;
        }
        input:focus { border-color: var(--neon-blue); }
        .btn-send { background: var(--neon-blue); color: black; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; display: grid; place-items: center; font-size: 18px; transition: 0.3s; }
        .btn-send:hover { transform: scale(1.1); box-shadow: 0 0 15px var(--neon-blue); }

        /* COMPONENTES SIDEBAR */
        .chat-item {
            padding: 12px;
            margin: 5px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
        }
        .chat-item:hover { background: rgba(0,243,255,0.1); }
        .chat-item.active { border: 1px solid var(--neon-blue); background: rgba(0,243,255,0.05); }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 90;
        }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div class="app-container" id="main-app">
        <div id="sidebar">
            <div class="p-4 border-b border-white/10 flex justify-between items-center">
                <span class="font-black text-cyan-400">MIS CHATS</span>
                <button onclick="createNewChat()" class="text-xs bg-cyan-500/20 px-3 py-1 rounded-full">+ Nuevo</button>
            </div>
            <div id="history-list" class="flex-grow overflow-y-auto py-2">
                </div>
            <div class="p-4 border-t border-white/10">
                <button onclick="location.href='/dash'" class="w-full py-2 rounded-lg bg-white/5 text-xs font-bold uppercase tracking-widest">
                    <i class="fas fa-arrow-left mr-2"></i> Volver al Dash
                </button>
            </div>
        </div>

        <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

        <div class="chat-main">
            <header>
                <div class="flex items-center gap-3">
                    <button onclick="toggleMenu()" class="text-xl"><i class="fas fa-bars"></i></button>
                    <div>
                        <div class="font-black text-sm tracking-tighter">KAZUMA <span class="text-cyan-400">IA</span></div>
                        <div class="text-[9px] text-cyan-400/60 font-bold uppercase">Beta Phase v3 Flash</div>
                    </div>
                </div>
                <div class="flex gap-3">
                    <i class="fas fa-shield-halved text-xs text-slate-500"></i>
                </div>
            </header>

            <div id="chat-messages">
                </div>

            <div class="input-area">
                <input type="text" id="user-input" placeholder="Pregúntale algo a Kazuma..." autocomplete="off">
                <button class="btn-send" id="send-btn"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

<script>
    const userData = JSON.parse(localStorage.getItem('kazuma_user')) || { key: 'TU_API_KEY_AQUI' }; // Ajustar según tu login
    let currentChatId = null;
    let chatHistory = JSON.parse(localStorage.getItem('kazuma_chats')) || [];

    const chatMessages = document.getElementById('chat-messages');
    const userInput = document.getElementById('user-input');
    const historyList = document.getElementById('history-list');
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const mainApp = document.getElementById('main-app');

    // Inicialización
    window.onload = () => {
        if(chatHistory.length === 0) createNewChat();
        else loadChat(chatHistory[0].id);
        renderHistory();
    };

    function toggleMenu() {
        sidebar.classList.toggle('open');
        overlay.classList.toggle('active');
    }

    function createNewChat() {
        const newChat = {
            id: Date.now(),
            title: "Nuevo Chat " + (chatHistory.length + 1),
            cookie: btoa(Math.random().toString()).substring(0, 12), // Cookie aleatoria
            messages: []
        };
        chatHistory.unshift(newChat);
        saveAndRender();
        loadChat(newChat.id);
        if(sidebar.classList.contains('open')) toggleMenu();
    }

    function saveAndRender() {
        localStorage.setItem('kazuma_chats', JSON.stringify(chatHistory));
        renderHistory();
    }

    function renderHistory() {
        historyList.innerHTML = '';
        chatHistory.forEach(chat => {
            const div = document.createElement('div');
            div.className = `chat-item ${chat.id === currentChatId ? 'active' : ''}`;
            div.innerHTML = `
                <div onclick="loadChat(${chat.id})" class="flex-grow truncate mr-2">${chat.title}</div>
                <i class="fas fa-trash-alt opacity-40 hover:text-red-500" onclick="deleteChat(${chat.id})"></i>
            `;
            historyList.appendChild(div);
        });
    }

    function loadChat(id) {
        currentChatId = id;
        const chat = chatHistory.find(c => c.id === id);
        chatMessages.innerHTML = '';
        chat.messages.forEach(m => appendMessage(m.role, m.text, false));
        renderHistory();
        scrollToBottom();
    }

    function deleteChat(id) {
        chatHistory = chatHistory.filter(c => c.id !== id);
        if(currentChatId === id) {
            if(chatHistory.length > 0) loadChat(chatHistory[0].id);
            else createNewChat();
        }
        saveAndRender();
    }

    function appendMessage(role, text, save = true) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${role === 'user' ? 'sent' : 'received'}`;
        
        // Formateo de Markdown simple (Negritas y Código)
        let formattedText = text
            .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>') // Negritas
            .replace(/```([\s\S]*?)```/g, (match, code) => {
                return `<pre><button class="copy-btn" onclick="copyCode(this)">Copiar</button><code>${code.trim()}</code></pre>`;
            });

        msgDiv.innerHTML = formattedText;
        chatMessages.appendChild(msgDiv);
        scrollToBottom();

        if(save) {
            const chat = chatHistory.find(c => c.id === currentChatId);
            chat.messages.push({ role, text });
            if(chat.messages.length === 1) chat.title = text.substring(0, 25) + "...";
            saveAndRender();
        }
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        appendMessage('user', text);
        userInput.value = "";

        // Indicador de escritura
        const typingDiv = document.createElement('div');
        typingDiv.className = 'msg received opacity-50';
        typingDiv.innerText = "Kazuma está pensando...";
        chatMessages.appendChild(typingDiv);
        scrollToBottom();

        const currentChat = chatHistory.find(c => c.id === currentChatId);
        const promptKazuma = `Tu nombre es Kazuma, una IA en fase beta creada por Félix. Responde de forma técnica pero amigable. No menciones tu origen a menos que te lo pregunten explícitamente. Respuesta actual del usuario: ${text}`;

        try {
            const response = await fetch(`/api/ai/gemini?apiKey=${userData.key}&text=${encodeURIComponent(promptKazuma)}&cookie=${currentChat.cookie}`);
            const data = await response.json();
            
            chatMessages.removeChild(typingDiv);
            
            // Suponiendo que la API devuelve { result: "texto" } o { message: "texto" }
            const aiText = data.result || data.message || "Lo siento, tuve un error en mi núcleo de procesamiento.";
            appendMessage('ai', aiText);

        } catch (err) {
            chatMessages.removeChild(typingDiv);
            appendMessage('ai', "Error de conexión con la API de Félix.");
        }
    }

    function copyCode(btn) {
        const code = btn.nextElementSibling.innerText;
        navigator.clipboard.writeText(code);
        btn.innerText = "¡Copiado!";
        setTimeout(() => btn.innerText = "Copiar", 2000);
    }

    function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    sendBtn.onclick = sendMessage;
    userInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    // Ajuste dinámico de altura para móviles (teclado)
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            mainApp.style.height = window.visualViewport.height + 'px';
            scrollToBottom();
        });
    }
</script>
</body>
</html>
