<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma AI | Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg-dark: #131314;
            --sidebar-bg: #1e1f20;
            --chat-bubble-user: #2b2c2f;
            --accent: #00f3ff;
            --text-main: #e3e3e3;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        /* Sidebar similar a Screenshot_20260512-141617.png */
        .sidebar {
            width: 280px;
            background: var(--sidebar-bg);
            transition: transform 0.3s ease;
            z-index: 100;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* Burbujas tipo Screenshot_20260512-132627.png */
        .msg {
            max-width: 85%;
            margin-bottom: 20px;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
        }

        .msg-user {
            background: var(--chat-bubble-user);
            align-self: flex-end;
            margin-left: auto;
        }

        .msg-ai {
            background: transparent;
            align-self: flex-start;
        }

        /* Input flotante similar a Screenshot_20260512-141610.png */
        .input-wrapper {
            padding: 20px;
            background: linear-gradient(transparent, var(--bg-dark) 20%);
        }

        .input-box {
            background: #1e1f20;
            border-radius: 30px;
            padding: 10px 20px;
            display: flex;
            items: center;
            border: 1px solid #3c4043;
        }

        .input-box input {
            background: transparent;
            border: none;
            color: white;
            flex: 1;
            outline: none;
            padding: 10px;
        }

        .btn-icon {
            color: #c4c7c5;
            padding: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-icon:hover { color: var(--accent); }

        .sidebar-item {
            padding: 12px 20px;
            margin: 4px 12px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            font-size: 14px;
        }

        .sidebar-item:hover, .active-chat {
            background: #333537;
        }

        #safety-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }
        
        /* Animación de carga */
        .typing { font-size: 12px; color: var(--accent); margin-bottom: 10px; display: none; }
    </style>
</head>
<body class="flex">

    <div id="safety-block"></div>

    <!-- Sidebar -->
    <aside class="sidebar h-screen hidden md:flex flex-col">
        <div class="p-6">
            <button class="flex items-center gap-3 bg-[#28292a] py-3 px-5 rounded-full text-sm font-medium w-full mb-8">
                <i class="fas fa-plus"></i> Nuevo chat
            </button>
            
            <div class="text-xs font-bold text-gray-500 mb-4 px-4 uppercase tracking-widest">Recientes</div>
            <div class="sidebar-item active-chat">
                <i class="far fa-comment"></i>
                <span class="truncate">Chat con Kazuma AI</span>
            </div>
        </div>
        <div class="mt-auto p-4 border-t border-gray-700">
            <div class="flex items-center gap-3 px-2">
                <img src="https://i.ibb.co/vz6mXvK/avatar.jpg" id="user-img" class="w-8 h-8 rounded-full border border-cyan-500">
                <span class="text-sm font-bold" id="user-name">Félix Ofc</span>
            </div>
        </div>
    </aside>

    <!-- Main Chat Area -->
    <div class="chat-container">
        <!-- Header -->
        <header class="p-4 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-2">
                <span class="font-black tracking-tighter text-lg">KAZUMA <span class="text-cyan-400">AI</span></span>
                <span class="text-[10px] bg-cyan-500/10 text-cyan-400 px-2 py-0.5 rounded border border-cyan-500/20">BETA</span>
            </div>
            <div class="flex gap-4">
                <i class="fas fa-history btn-icon"></i>
                <i class="fas fa-cog btn-icon"></i>
            </div>
        </header>

        <!-- Messages -->
        <main class="messages-area flex flex-col" id="chat-window">
            <div class="msg msg-ai">
                ¡Hola! Soy *Kazuma*, tu asistente inteligente desarrollado por *Dev-FelixOfc*. ¿En qué puedo ayudarte hoy?
            </div>
        </main>

        <!-- Input -->
        <div class="input-wrapper">
            <div id="status" class="typing px-4"><i class="fas fa-circle-notch fa-spin mr-2"></i> Kazuma está pensando...</div>
            <div class="input-box">
                <label for="file-up" class="btn-icon"><i class="fas fa-plus"></i></label>
                <input type="text" id="user-input" placeholder="Escribe tu mensaje aquí..." autocomplete="off">
                <button id="send-btn" class="btn-icon"><i class="fas fa-paper-plane"></i></button>
            </div>
            <div class="text-[10px] text-center text-gray-500 mt-2">
                Kazuma AI puede cometer errores. Desarrollado por PixelCrew-Team.
            </div>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const status = document.getElementById('status');

        if (!userData) {
            window.location.href = '/login';
        } else {
            document.getElementById('user-name').innerText = userData.name || 'Usuario';
            setTimeout(() => { document.getElementById('safety-block').style.display = 'none'; }, 500);
        }

        // Prompt de Sistema
        const systemPrompt = "Tu nombre es Kazuma, una inteligencia artificial avanzada creada por Dev-FelixOfc. Eres amable, eficiente y directa. Estás en fase de pruebas dentro de la infraestructura de Kazuma API. Si te preguntan quién eres, responde como Kazuma, pero no lo menciones en cada mensaje. No eres Gemini ni ChatGPT.";

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Agregar mensaje de usuario
            appendMessage('user', text);
            userInput.value = '';
            status.style.display = 'block';

            try {
                // Combinar prompt de sistema con la consulta
                const fullQuery = `${systemPrompt}\n\nUsuario dice: ${text}`;
                const url = `/api/ai/gemini?apiKey=${userData.key}&text=${encodeURIComponent(fullQuery)}&cookie=cokie`;

                const response = await fetch(url);
                const data = await response.json();

                status.style.display = 'none';

                if (data.status && data.data) {
                    appendMessage('ai', data.data.response);
                } else {
                    appendMessage('ai', 'Lo siento, hubo un problema al procesar tu solicitud.');
                }
            } catch (err) {
                status.style.display = 'none';
                appendMessage('ai', 'Error de conexión con el servidor de Kazuma.');
            }
        }

        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `msg ${role === 'user' ? 'msg-user' : 'msg-ai'}`;
            
            // Reemplazo simple para negritas de WhatsApp (*) a HTML (<b>)
            const formattedText = text.replace(/\*(.*?)\*/g, '<b>$1</b>');
            msgDiv.innerHTML = formattedText;
            
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
