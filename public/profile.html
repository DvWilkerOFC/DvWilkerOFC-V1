<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil | Kazuma API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-blue: #00f3ff; --dark-bg: #0d0d0d; --card-bg: #161625; }
        body { background: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: none; }
        #safety-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .glass { background: var(--card-bg); border: 1px solid rgba(0, 243, 255, 0.1); }
        .input-kazuma { background: #080810; border: 1px solid rgba(255,255,255,0.1); color: #fff; outline: none; transition: 0.3s; }
        .input-kazuma:focus { border-color: var(--neon-blue); }
        .input-kazuma:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-dash { border: 1px solid var(--neon-blue); color: var(--neon-blue); transition: 0.3s; }
        .btn-dash:hover { background: var(--neon-blue); color: #000; }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--neon-blue); box-shadow: 0 0 20px rgba(0, 243, 255, 0.2); }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="safety-block"><p style="color: var(--neon-blue); font-family: monospace;">VERIFICANDO PROTOCOLO...</p></div>

    <div class="p-6 flex justify-between items-center max-w-2xl mx-auto">
        <a href="/dash" class="btn-dash px-4 py-2 rounded-lg text-xs font-bold uppercase tracking-widest">
            <i class="fas fa-arrow-left mr-2"></i> Volver al Dash
        </a>
        <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest">User Profile</div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <div class="glass rounded-3xl p-8 text-center mb-6">
            <div class="flex justify-center mb-4">
                <img src="https://upload.yotsuba.giize.com/u/oco-1ZRU.jpg" class="profile-img">
            </div>
            <h2 id="display-name" class="text-2xl font-black uppercase">Cargando...</h2>
            <p id="display-plan" class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest mt-1">Plan: ---</p>
        </div>

        <div class="space-y-6">
            <div class="glass rounded-2xl p-6">
                <label class="block text-[10px] font-black text-slate-500 mb-2 uppercase tracking-widest">Tu API Key (Única)</label>
                <div class="flex gap-2">
                    <input type="text" id="apiKey" class="input-kazuma flex-1 rounded-xl p-3 text-sm font-mono" disabled>
                    <button onclick="copyKey()" class="bg-white/5 hover:bg-white/10 p-3 rounded-xl transition">
                        <i class="fas fa-copy text-cyan-400"></i>
                    </button>
                </div>
            </div>

            <form id="updateForm" class="glass rounded-2xl p-6 space-y-4">
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-1 uppercase tracking-widest">Username</label>
                    <input type="text" id="username" class="input-kazuma w-full rounded-xl p-3 text-sm" required>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-1 uppercase tracking-widest">Email</label>
                    <input type="email" id="email" class="input-kazuma w-full rounded-xl p-3 text-sm" required>
                </div>
                <div>
                    <label class="block text-[10px] font-black text-slate-500 mb-1 uppercase tracking-widest">Nueva Contraseña (Opcional)</label>
                    <input type="password" id="newPassword" class="input-kazuma w-full rounded-xl p-3 text-sm" placeholder="Dejar vacío para no cambiar">
                </div>
                <button type="submit" class="w-full py-4 bg-cyan-500 hover:bg-cyan-400 text-black font-black rounded-xl transition uppercase text-xs tracking-widest">
                    Guardar Cambios
                </button>
            </form>
        </div>

        <div class="mt-10 text-center text-slate-600 text-[10px] uppercase font-bold tracking-widest leading-relaxed">
            Copyright © 2026 Kazuma API. All rights reserved. <br> Powered by <span class="text-cyan-500">KurayamiTeam</span>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));

        if (!userData) {
            window.location.href = '/login';
        } else {
            document.body.style.display = 'block';
            setTimeout(() => { document.getElementById('safety-block').style.display = 'none'; }, 800);
            
            document.getElementById('display-name').innerText = userData.username;
            document.getElementById('display-plan').innerText = `Plan: ${userData.plan}`;
            document.getElementById('username').value = userData.username;
            document.getElementById('email').value = userData.email || ""; // Si no lo guardaste en el login, se puede traer con /api/auth/me
            document.getElementById('apiKey').value = userData.key;
        }

        function copyKey() {
            const key = document.getElementById('apiKey');
            navigator.clipboard.writeText(key.value);
            Swal.fire({ title: 'Copiado', text: 'API Key copiada al portapapeles', icon: 'success', background: '#161625', color: '#fff', timer: 1000, showConfirmButton: false });
        }

        document.getElementById('updateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            // Aquí iría el fetch a una ruta de actualización que podrías crear luego en el backend
            Swal.fire({ title: 'Próximamente', text: 'La actualización de perfil estará disponible en la próxima versión.', icon: 'info', background: '#161625', color: '#fff' });
        });
    </script>
</body>
</html>
