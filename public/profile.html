<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma | Perfil</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://www.google.com/recaptcha/api.js?render=6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5"></script>

    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --dark-bg: #09090b; 
            --card-bg: #11111d; 
            --text-main: #ffffff; 
            --text-muted: #8e8e93; 
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body.light-mode {
            --dark-bg: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
            --text-muted: #636366;
        }

        body { 
            background-color: var(--dark-bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            transition: background-color var(--transition), color var(--transition);
        }

        .glass { 
            background: var(--card-bg); 
            border: 1px solid rgba(0, 243, 255, 0.1); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: var(--transition);
        }

        body.light-mode .glass {
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .input-kazuma { 
            background: rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: var(--text-main); 
            transition: 0.3s; 
        }

        body.light-mode .input-kazuma {
            background: rgba(0,0,0,0.03);
            border: 1px solid rgba(0,0,0,0.1);
        }

        .input-kazuma:focus { border-color: var(--neon-blue); outline: none; }

        .btn-blue { background: var(--neon-blue); color: #000; font-weight: 900; transition: 0.3s; }
        .btn-blue:hover { filter: brightness(1.2); }

        .grecaptcha-badge { 
            width: 70px !important; 
            overflow: hidden !important; 
            transition: all 0.3s ease !important;
            left: auto !important; 
            right: 0px !important; 
            bottom: 20px !important;
            z-index: 9999 !important;
        }
        .grecaptcha-badge:hover { width: 256px !important; }

        #view-img { 
            width: 120px; height: 120px; border-radius: 50%; object-fit: cover; 
            border: 3px solid var(--neon-blue); 
        }

        header { 
            background: rgba(12, 12, 20, 0.9); 
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 243, 255, 0.1); 
        }

        body.light-mode header {
            background: rgba(255, 255, 255, 0.85);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="font-black text-xl tracking-tighter cursor-pointer" onclick="location.href='/dash'">
            KAZUMA <span style="color: var(--neon-blue)">DASH</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-xl cursor-pointer" style="color: var(--neon-blue)" onclick="toggleTheme()" id="theme-btn">
                <i class="fas fa-moon"></i>
            </div>
            <button onclick="location.href='/dash'" class="text-xs font-bold bg-white/5 px-4 py-2 rounded-xl border border-white/10 uppercase">
                <i class="fas fa-arrow-left mr-1"></i> Volver
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-2xl">
        <div class="glass rounded-[32px] p-8 mt-6 text-center">
            <img id="view-img" src="https://files.catbox.moe/9ssbf9.jpg" class="mx-auto" alt="Avatar">
            <h2 id="view-username" class="text-2xl font-black mt-4 uppercase">...</h2>
            <p id="view-id" class="text-slate-500 font-bold text-xs mt-1">...</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-6">
            <div class="glass p-5 rounded-3xl">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Plan</p>
                <p id="view-plan" class="text-lg font-black text-yellow-500">---</p>
            </div>
            <div class="glass p-5 rounded-3xl">
                <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">Límite</p>
                <p id="view-requests" class="text-lg font-black text-cyan-500">0</p>
            </div>
        </div>

        <div class="glass rounded-[32px] p-8 mt-8">
            <h3 class="text-sm font-black mb-6 uppercase flex items-center gap-2">
                <i class="fas fa-user-edit" style="color: var(--neon-blue)"></i> Editar Perfil
            </h3>
            
            <div class="space-y-6">
                <div class="p-4 rounded-2xl bg-black/20 border border-white/5">
                    <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">Tu API Key</label>
                    <div class="flex gap-2">
                        <input type="text" id="view-apikey" class="input-kazuma w-full p-3 rounded-xl font-mono text-xs" readonly>
                        <button onclick="copyKey()" class="btn-blue px-4 rounded-xl"><i class="fas fa-copy"></i></button>
                    </div>
                </div>

                <div class="grid gap-5">
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">Imagen (URL)</label>
                        <div class="flex gap-2">
                            <input type="text" id="new-img" class="input-kazuma w-full p-3 rounded-xl text-sm" placeholder="URL de imagen">
                            <button onclick="updateData('profile_img')" class="btn-blue px-5 rounded-xl text-[10px]">Actualizar</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">Usuario</label>
                        <div class="flex gap-2">
                            <input type="text" id="new-username" class="input-kazuma w-full p-3 rounded-xl text-sm" placeholder="Nuevo nombre">
                            <button onclick="updateData('username')" class="btn-blue px-5 rounded-xl text-[10px]">Actualizar</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">Email</label>
                        <div class="flex gap-2">
                            <input type="email" id="new-email" class="input-kazuma w-full p-3 rounded-xl text-sm" placeholder="Nuevo email">
                            <button onclick="updateData('email')" class="btn-blue px-5 rounded-xl text-[10px]">Actualizar</button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-2 uppercase">Contraseña</label>
                        <div class="flex gap-2">
                            <input type="password" id="new-pass" class="input-kazuma w-full p-3 rounded-xl text-sm" placeholder="••••••••">
                            <button onclick="updateData('password')" class="btn-blue px-5 rounded-xl text-[10px]">Actualizar</button>
                        </div>
                    </div>
                </div>

                <div class="pt-6 mt-2 border-t border-white/5">
                    <button onclick="logout()" class="w-full bg-white/5 hover:bg-red-500/10 text-red-500 p-4 rounded-2xl font-black uppercase text-[10px] transition border border-white/5">
                        Cerrar Sesión
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) window.location.href = '/login';

        function toggleTheme() {
            const body = document.body;
            const themeBtn = document.getElementById('theme-btn');
            const icon = themeBtn.querySelector('i');
            body.classList.toggle('light-mode');
            if (body.classList.contains('light-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.setItem('kazuma-theme', 'light');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.setItem('kazuma-theme', 'dark');
            }
        }

        async function loadProfile() {
            const savedTheme = localStorage.getItem('kazuma-theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-mode');
                document.getElementById('theme-btn').querySelector('i').classList.replace('fa-moon', 'fa-sun');
            }

            grecaptcha.ready(() => {
                grecaptcha.execute('6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5', {action: 'profile_load'});
            });

            try {
                const res = await fetch(`/api/auth/me?apiKey=${userData.key}`);
                const result = await res.json();
                if (result.status) {
                    const u = result.data;
                    document.getElementById('view-username').innerText = u.username.toUpperCase();
                    document.getElementById('view-id').innerText = u.email;
                    document.getElementById('view-apikey').value = u.key;
                    document.getElementById('view-requests').innerText = u.requests.limit;
                    document.getElementById('view-plan').innerText = u.plan.toUpperCase();
                    if (u.profile_img) document.getElementById('view-img').src = u.profile_img;
                }
            } catch (e) { console.error("Error"); }
        }

        async function updateData(type) {
            const inputMap = { 'username': 'new-username', 'email': 'new-email', 'password': 'new-pass', 'profile_img': 'new-img' };
            const val = document.getElementById(inputMap[type]).value.trim();
            if (!val) return;

            try {
                const res = await fetch(`/api/auth/update-profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: userData.key, type, value: val })
                });
                const data = await res.json();
                if (data.status) {
                    if (type !== 'password') {
                        userData[type === 'profile_img' ? 'profile_img' : type] = val;
                        localStorage.setItem('kazuma_user', JSON.stringify(userData));
                    }
                    Swal.fire({ title: 'Éxito', text: 'Datos actualizados', icon: 'success', background: 'var(--card-bg)', color: 'var(--text-main)' }).then(() => location.reload());
                }
            } catch (e) { console.error("Error"); }
        }

        function copyKey() {
            navigator.clipboard.writeText(document.getElementById('view-apikey').value);
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copiado', showConfirmButton: false, timer: 1500, background: 'var(--card-bg)', color: 'var(--text-main)' });
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        window.onload = loadProfile;
    </script>
</body>
</html>
