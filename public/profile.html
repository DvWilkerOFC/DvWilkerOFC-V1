<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Perfil | Kazuma API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon-pink: #ff2d55; 
            --neon-blue: #00f3ff; 
            --dark-bg: #09090b; 
            --card-bg: #11111d; 
            --text-main: #ffffff; 
            --text-muted: #8e8e93; 
        }
        
        body { 
            background: var(--dark-bg); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            display: none; 
            overflow-x: hidden;
        }

        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(0, 243, 255, 0.1); border-top: 3px solid var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 15px var(--neon-blue); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { margin-top: 15px; font-weight: 900; font-size: 0.8rem; color: var(--neon-blue); text-transform: uppercase; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        .glass { 
            background: var(--card-bg); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .input-kazuma { 
            background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: #fff; 
            outline: none; 
            transition: 0.3s; 
        }
        .input-kazuma:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0, 243, 255, 0.2); }
        .input-kazuma:disabled { opacity: 0.5; }

        .btn-back { 
            border: 1px solid var(--neon-pink); 
            color: var(--neon-pink); 
            text-shadow: 0 0 5px var(--neon-pink);
            transition: 0.3s; 
        }
        .btn-back:hover { background: var(--neon-pink); color: #000; box-shadow: 0 0 20px var(--neon-pink); }

        .profile-img-container {
            position: relative;
            display: inline-block;
        }
        .profile-img { 
            width: 120px; height: 120px; border-radius: 50%; 
            border: 3px solid var(--neon-pink); 
            box-shadow: 0 0 25px rgba(255, 45, 85, 0.4);
            object-fit: cover;
        }

        .user-card-glow {
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(0,243,255,0.02) 100%);
            border: 1px solid rgba(255,255,255,0.08);
        }

        .nav-category { 
            color: var(--neon-blue); 
            font-size: 0.7rem; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
    </style>
</head>
<body class="min-h-screen pb-10">
    <div id="preloader">
        <div class="spinner"></div>
        <div class="loading-text">Cargando Perfil...</div>
    </div>

    <div class="p-6 flex justify-between items-center max-w-2xl mx-auto">
        <a href="/dash" class="btn-back px-5 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest">
            <i class="fas fa-chevron-left mr-2"></i> Volver al Dash
        </a>
        <div class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Protocolo: Profile</div>
    </div>

    <div class="max-w-2xl mx-auto px-4">
        <div class="glass user-card-glow rounded-[35px] p-8 text-center mb-6">
            <div class="flex justify-center mb-5">
                <div class="profile-img-container">
                    <img id="avatar-preview" src="https://upload.yotsuba.giize.com/u/oco-1ZRU.jpg" class="profile-img">
                </div>
            </div>
            <h2 id="display-name" class="text-2xl font-black uppercase tracking-tighter">Cargando...</h2>
            <div id="display-plan" class="inline-block px-4 py-1 rounded-full bg-cyan-500/10 text-cyan-400 text-[10px] font-black uppercase tracking-widest mt-2 border border-cyan-500/20">
                Plan: ---
            </div>
        </div>

        <div class="space-y-6">
            <div class="glass rounded-3xl p-6">
                <p class="nav-category mb-4"><i class="fas fa-shield-halved"></i> Acceso Seguro</p>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[9px] font-black text-slate-500 mb-2 uppercase tracking-widest">Tu Llave de Acceso (API KEY)</label>
                        <div class="flex gap-2">
                            <input type="text" id="apiKey" class="input-kazuma flex-1 rounded-2xl p-4 text-xs font-mono" disabled>
                            <button onclick="copyKey()" class="bg-cyan-500/10 hover:bg-cyan-500/20 p-4 rounded-2xl transition border border-cyan-500/20">
                                <i class="fas fa-copy text-cyan-400"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <form id="updateForm" class="glass rounded-3xl p-6 space-y-5">
                <p class="nav-category mb-2"><i class="fas fa-user-edit"></i> Editar Información</p>
                
                <div class="grid grid-cols-1 gap-4">
                    <div>
                        <label class="block text-[9px] font-black text-slate-500 mb-2 uppercase tracking-widest">Nombre de Usuario</label>
                        <input type="text" id="username" class="input-kazuma w-full rounded-2xl p-4 text-sm font-bold" required>
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-slate-500 mb-2 uppercase tracking-widest">Correo Electrónico</label>
                        <input type="email" id="email" class="input-kazuma w-full rounded-2xl p-4 text-sm font-bold" required>
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-slate-500 mb-2 uppercase tracking-widest">URL de Foto de Perfil</label>
                        <input type="text" id="profilePic" class="input-kazuma w-full rounded-2xl p-4 text-sm font-mono" placeholder="https://link-de-tu-imagen.jpg">
                    </div>
                    <div>
                        <label class="block text-[9px] font-black text-slate-500 mb-2 uppercase tracking-widest">Cambiar Contraseña</label>
                        <input type="password" id="newPassword" class="input-kazuma w-full rounded-2xl p-4 text-sm" placeholder="Nueva contraseña (opcional)">
                    </div>
                </div>

                <button type="submit" class="w-full py-5 bg-cyan-500 hover:bg-cyan-400 text-black font-black rounded-2xl transition-all shadow-[0_0_20px_rgba(6,182,212,0.4)] uppercase text-[11px] tracking-[3px] mt-4">
                    Sincronizar Cambios
                </button>
            </form>
        </div>

        <div class="mt-10 text-center text-slate-600 text-[10px] uppercase font-bold tracking-[2px] leading-relaxed opacity-50">
            Copyright © 2026 Kazuma API • PROTOCOLO KURAYAMI <br>
            <span class="text-cyan-500">SYSTEM STATUS: ONLINE</span>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));

        if (!userData) {
            window.location.href = '/login';
        } else {
            document.body.style.display = 'block';
            setTimeout(() => { document.getElementById('preloader').style.display = 'none'; }, 800);

            document.getElementById('display-name').innerText = userData.username;
            document.getElementById('display-plan').innerText = `Plan: ${userData.plan.toUpperCase()}`;
            document.getElementById('username').value = userData.username;
            document.getElementById('email').value = userData.email || "";
            document.getElementById('apiKey').value = userData.key;
            document.getElementById('profilePic').value = userData.profileImg || "https://upload.yotsuba.giize.com/u/oco-1ZRU.jpg";
            document.getElementById('avatar-preview').src = userData.profileImg || "https://upload.yotsuba.giize.com/u/oco-1ZRU.jpg";
        }

        function copyKey() {
            const key = document.getElementById('apiKey');
            navigator.clipboard.writeText(key.value);
            Swal.fire({ toast: true, position: 'top-end', title: 'Copiado', icon: 'success', background: '#11111d', color: '#fff', showConfirmButton: false, timer: 1500 });
        }

        document.getElementById('updateForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const updatedData = {
                username: document.getElementById('username').value,
                email: document.getElementById('email').value,
                profileImg: document.getElementById('profilePic').value,
                password: document.getElementById('newPassword').value
            };

            Swal.fire({
                title: 'Actualizando...',
                text: 'Enviando datos al servidor',
                allowOutsideClick: false,
                background: '#11111d',
                color: '#fff',
                didOpen: () => { Swal.showLoading(); }
            });

            try {
                const response = await fetch('/api/auth/update-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updatedData)
                });

                const result = await response.json();

                if (result.status) {
                    // Actualizamos el localStorage para que los cambios se vean en el dash también
                    const newUserData = { ...userData, ...updatedData };
                    localStorage.setItem('kazuma_user', JSON.stringify(newUserData));
                    
                    document.getElementById('avatar-preview').src = updatedData.profileImg;
                    document.getElementById('display-name').innerText = updatedData.username;

                    Swal.fire({ title: 'Éxito', text: 'Protocolo de perfil actualizado', icon: 'success', background: '#11111d', color: '#fff' });
                } else {
                    Swal.fire({ title: 'Error', text: result.message, icon: 'error', background: '#11111d', color: '#fff' });
                }
            } catch (err) {
                Swal.fire({ title: 'Error', text: 'Error de conexión con el servidor', icon: 'error', background: '#11111d', color: '#fff' });
            }
        });
    </script>
</body>
</html>
