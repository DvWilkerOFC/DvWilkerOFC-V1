<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma | Mi Perfil</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --neon-pink: #ff2d55; --neon-blue: #00f3ff; --dark-bg: #0d0d0d; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; }
        .glass { background: #161625; border: 1px solid rgba(255,255,255,0.1); }
        #view-img { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 2px solid var(--neon-pink); background: #1a1a2e; margin: 0 auto; }
        .input-dark { background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); color: white; transition: 0.3s; }
        .input-dark:focus { border-color: var(--neon-blue); }
        .label-clear { color: #ffffff; font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; }
        .btn-action { transition: 0.3s; text-transform: uppercase; font-weight: 900; font-size: 0.7rem; }
        .btn-action:hover { filter: brightness(1.2); transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="p-4 border-b border-white/10 flex justify-between items-center sticky top-0 bg-[#0d0d0d] z-50">
        <div class="font-bold text-xl uppercase tracking-tighter" onclick="location.href='/dash'" style="cursor:pointer">KAZUMA <span>PROFILER</span></div>
        <button onclick="location.href='/dash'" class="text-sm bg-white/10 px-4 py-2 rounded-xl hover:bg-white/20 transition"><i class="fas fa-arrow-left mr-2"></i> INICIO</button>
    </header>

    <main class="container mx-auto p-4 flex-grow max-w-2xl">
        <div class="glass rounded-3xl p-8 mt-6 text-center">
            <img id="view-img" src="https://upload.yotsuba.giize.com/u/oco-1ZRU.jpg" alt="Foto">
            <h2 id="view-username" class="text-2xl font-black mt-4">...</h2>
            <p id="view-id" class="text-blue-400 font-mono text-sm">Cargando...</p>
        </div>

        <div class="glass p-6 rounded-2xl mt-6 border-l-4 border-[#00f3ff]">
            <p class="label-clear mb-3">Tu Llave Maestra (API KEY)</p>
            <div class="flex gap-2">
                <input type="text" id="view-apikey" class="input-dark w-full p-4 rounded-xl outline-none font-mono text-sm" readonly>
                <button onclick="copyKey()" class="bg-[#00f3ff] text-black px-5 rounded-xl font-bold hover:bg-white transition"><i class="fas fa-copy"></i></button>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4 mt-4">
            <div class="glass p-5 rounded-2xl">
                <p class="label-clear mb-1" style="font-size: 0.6rem;">Plan Actual</p>
                <p id="view-plan" class="text-lg font-bold text-yellow-400">...</p>
            </div>
            <div class="glass p-5 rounded-2xl">
                <p class="label-clear mb-1" style="font-size: 0.6rem;">Límite Diario</p>
                <p id="view-requests" class="text-lg font-bold text-pink-500">0</p>
            </div>
        </div>

        <div class="glass rounded-3xl p-8 mt-8 mb-10">
            <h3 class="text-xl font-bold mb-6 uppercase tracking-tighter"><i class="fas fa-cog mr-3 text-pink-500"></i> Ajustes</h3>
            <div class="space-y-6">
                <div>
                    <label class="block label-clear mb-2">URL Foto de Perfil</label>
                    <div class="flex gap-2">
                        <input type="text" id="new-img" class="input-dark w-full p-3 rounded-xl outline-none" placeholder="https://enlace-imagen.com/foto.jpg">
                        <button onclick="updateData('profile_img')" class="bg-cyan-600 px-5 rounded-xl btn-action">Update</button>
                    </div>
                </div>
                <div>
                    <label class="block label-clear mb-2">Usuario</label>
                    <div class="flex gap-2">
                        <input type="text" id="new-username" class="input-dark w-full p-3 rounded-xl outline-none" placeholder="Nuevo nombre...">
                        <button onclick="updateData('username')" class="bg-pink-600 px-5 rounded-xl btn-action">Cambiar</button>
                    </div>
                </div>
                <div>
                    <label class="block label-clear mb-2">Email</label>
                    <div class="flex gap-2">
                        <input type="email" id="new-email" class="input-dark w-full p-3 rounded-xl outline-none" placeholder="nuevo@correo.com">
                        <button onclick="updateData('email')" class="bg-blue-600 px-5 rounded-xl btn-action">Update</button>
                    </div>
                </div>
                <div>
                    <label class="block label-clear mb-2">Password</label>
                    <div class="flex gap-2">
                        <input type="password" id="new-pass" class="input-dark w-full p-3 rounded-xl outline-none" placeholder="••••••••">
                        <button onclick="updateData('password')" class="bg-slate-700 px-5 rounded-xl btn-action">Update</button>
                    </div>
                </div>
                <div class="pt-6 border-t border-white/10 space-y-4">
                    <button onclick="logout()" class="w-full bg-white/5 hover:bg-white/10 p-4 rounded-2xl font-bold uppercase text-xs transition">Cerrar Sesión</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) window.location.href = '/login';

        async function loadProfile() {
            try {
                // Obtenemos datos actualizados desde el backend usando tu ruta /me
                const res = await fetch(`/api/auth/me?apiKey=${userData.key}`);
                const result = await res.json();
                if (result.status) {
                    const u = result.data;
                    document.getElementById('view-username').innerText = u.username.toUpperCase();
                    document.getElementById('view-id').innerText = `EMAIL: ${u.email}`;
                    document.getElementById('view-apikey').value = u.key;
                    document.getElementById('view-requests').innerText = u.requests.limit;
                    document.getElementById('view-plan').innerText = u.plan.toUpperCase();
                    
                    // Si el usuario tiene profile_img en el json, la mostramos
                    // Nota: Debes asegurarte que el backend envíe 'profile_img' en /me si existe
                    if (u.profile_img) document.getElementById('view-img').src = u.profile_img;
                }
            } catch (e) { console.error("Error al cargar perfil"); }
        }

        async function updateData(type) {
            const inputMap = {
                'username': 'new-username',
                'email': 'new-email',
                'password': 'new-pass',
                'profile_img': 'new-img'
            };
            const val = document.getElementById(inputMap[type]).value.trim();
            if (!val) return Swal.fire({ title: 'Atención', text: 'Completa el campo.', icon: 'warning', background: '#161625', color: '#fff' });

            try {
                const res = await fetch(`/api/auth/update-profile`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: userData.key, type, value: val })
                });
                const data = await res.json();
                if (data.status) {
                    // Actualizamos el localStorage para que el Dash no use datos viejos
                    if (type !== 'password') {
                        userData[type === 'profile_img' ? 'profileImg' : type] = val;
                        localStorage.setItem('kazuma_user', JSON.stringify(userData));
                    }
                    Swal.fire({ title: 'Éxito', text: 'Perfil actualizado.', icon: 'success', background: '#161625', color: '#fff' }).then(() => location.reload());
                } else {
                    Swal.fire({ title: 'Error', text: data.message || 'Error al actualizar.', icon: 'error', background: '#161625', color: '#fff' });
                }
            } catch (e) { Swal.fire({ title: 'Error', text: 'Sin conexión.', icon: 'error', background: '#161625', color: '#fff' }); }
        }

        function copyKey() {
            const keyInput = document.getElementById('view-apikey');
            navigator.clipboard.writeText(keyInput.value);
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copiado', showConfirmButton: false, timer: 1500, background: '#161625', color: '#fff' });
        }

        function logout() { localStorage.clear(); window.location.href = '/login'; }

        window.onload = loadProfile;
    </script>
</body>
</html>
