<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma | Descargas</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.google.com/recaptcha/api.js?render=6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5"></script>

    <style>
        :root { 
            --neon-blue: #00f3ff; 
            --dark-bg: #09090b; 
            --card-bg: #11111d; 
            --text-main: #ffffff; 
            --transition: 0.2s ease;
        }

        body.light-mode {
            --dark-bg: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #1a1a1a;
        }

        #safety-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; }

        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Inter', sans-serif; transition: background-color var(--transition); }

        .glass { background: var(--card-bg); border: 1px solid rgba(0, 243, 255, 0.1); transition: var(--transition); }
        
        .input-kazuma { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); color: var(--text-main); outline: none; transition: 0.3s; }
        body.light-mode .input-kazuma { background: rgba(0,0,0,0.03); border: 1px solid rgba(0,0,0,0.1); }
        .input-kazuma:focus { border-color: var(--neon-blue); }

        .btn-action { background: var(--neon-blue); color: #000; font-weight: 900; transition: 0.3s; text-transform: uppercase; }
        .btn-action:hover { filter: brightness(1.2); transform: scale(1.02); }

        .endpoint-badge { background: rgba(0, 243, 255, 0.1); color: var(--neon-blue); font-family: monospace; font-size: 10px; padding: 8px; border-radius: 10px; border: 1px dashed var(--neon-blue); width: 100%; margin-bottom: 12px; display: block; overflow-x: auto; }

        .result-box { background: rgba(0,0,0,0.3); border-radius: 15px; padding: 15px; margin-top: 15px; font-size: 11px; display: none; border: 1px solid rgba(255,255,255,0.05); }

        .grecaptcha-badge { width: 70px !important; overflow: hidden !important; transition: 0.3s !important; right: 0px !important; bottom: 20px !important; z-index: 9999 !important; }
        .grecaptcha-badge:hover { width: 256px !important; }

        header { background: rgba(12, 12, 20, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 243, 255, 0.1); }
        body.light-mode header { background: rgba(255, 255, 255, 0.85); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="min-h-screen pb-20">
    <div id="safety-block"></div>

    <header class="p-4 flex justify-between items-center sticky top-0 z-50">
        <div class="font-black text-xl tracking-tighter cursor-pointer" onclick="location.href='/dash'">
            KAZUMA <span style="color: var(--neon-blue)">DOWNLOAD</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-xl cursor-pointer" style="color: var(--neon-blue)" onclick="toggleTheme()" id="theme-btn">
                <i class="fas fa-moon"></i>
            </div>
            <button onclick="location.href='/dash'" class="text-xs font-bold bg-white/5 px-4 py-2 rounded-xl border border-white/10">
                <i class="fas fa-arrow-left"></i>
            </button>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-2xl">
        <div class="mt-4 mb-8">
            <h1 class="text-2xl font-black uppercase tracking-tighter">Centro de <span style="color: var(--neon-blue)">Descargas</span></h1>
            <p class="text-slate-500 text-xs font-bold uppercase tracking-widest mt-1">Prueba los endpoints de forma directa</p>
        </div>

        <div class="grid gap-6">
            <div class="glass rounded-[32px] p-6">
                <h3 class="font-black text-sm uppercase mb-4 flex items-center gap-2">
                    <i class="fab fa-facebook text-blue-500"></i> Facebook Video
                </h3>
                <code class="endpoint-badge">/api/download/facebook?url=</code>
                <input type="text" id="url-fb" class="input-kazuma w-full p-4 rounded-2xl text-xs mb-3" placeholder="https://www.facebook.com/watch/?v=...">
                <button onclick="testApi('facebook', 'url-fb')" class="btn-action w-full p-4 rounded-2xl text-xs flex justify-center items-center gap-2">
                    <i class="fas fa-paper-plane"></i> Probar Endpoint
                </button>
                <div id="res-facebook" class="result-box"></div>
            </div>

            <div class="glass rounded-[32px] p-6">
                <h3 class="font-black text-sm uppercase mb-4 flex items-center gap-2">
                    <i class="fab fa-tiktok"></i> TikTok Downloader
                </h3>
                <code class="endpoint-badge">/api/download/tiktok?url=</code>
                <input type="text" id="url-tt" class="input-kazuma w-full p-4 rounded-2xl text-xs mb-3" placeholder="https://www.tiktok.com/@user/video/...">
                <button onclick="testApi('tiktok', 'url-tt')" class="btn-action w-full p-4 rounded-2xl text-xs flex justify-center items-center gap-2">
                    <i class="fas fa-paper-plane"></i> Probar Endpoint
                </button>
                <div id="res-tiktok" class="result-box"></div>
            </div>

            <div class="glass rounded-[32px] p-6">
                <h3 class="font-black text-sm uppercase mb-4 flex items-center gap-2">
                    <i class="fab fa-instagram text-pink-500"></i> Instagram Reels
                </h3>
                <code class="endpoint-badge">/api/download/instagram?url=</code>
                <input type="text" id="url-ig" class="input-kazuma w-full p-4 rounded-2xl text-xs mb-3" placeholder="https://www.instagram.com/reels/...">
                <button onclick="testApi('instagram', 'url-ig')" class="btn-action w-full p-4 rounded-2xl text-xs flex justify-center items-center gap-2">
                    <i class="fas fa-paper-plane"></i> Probar Endpoint
                </button>
                <div id="res-instagram" class="result-box"></div>
            </div>
        </div>
    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) {
            window.location.href = '/login';
        } else {
            document.addEventListener("DOMContentLoaded", () => {
                setTimeout(() => { document.getElementById('safety-block').style.display = 'none'; }, 300);
            });
        }

        function toggleTheme() {
            const body = document.body;
            const isLight = body.classList.toggle('light-mode');
            document.getElementById('theme-btn').querySelector('i').classList.replace(isLight ? 'fa-moon' : 'fa-sun', isLight ? 'fa-sun' : 'fa-moon');
            localStorage.setItem('kazuma-theme', isLight ? 'light' : 'dark');
        }

        async function testApi(route, inputId) {
            const urlValue = document.getElementById(inputId).value.trim();
            const resBox = document.getElementById(`res-${route}`);
            
            if (!urlValue) return Swal.fire({ icon: 'warning', title: 'Falta URL', background: 'var(--card-bg)', color: 'var(--text-main)' });

            resBox.style.display = 'block';
            resBox.innerHTML = '<span class="animate-pulse">Solicitando datos...</span>';

            try {
                const response = await fetch(`/api/download/${route}?url=${encodeURIComponent(urlValue)}&apiKey=${userData.key}`);
                const data = await response.json();
                
                // Formatear JSON para mostrar
                resBox.innerHTML = `<pre style="white-space: pre-wrap; word-break: break-all;">${JSON.stringify(data, null, 2)}</pre>`;
            } catch (e) {
                resBox.innerHTML = `<span class="text-red-500">Error: No se pudo conectar con la API.</span>`;
            }
        }

        window.onload = () => {
            if (localStorage.getItem('kazuma-theme') === 'light') toggleTheme();
            grecaptcha.ready(() => { grecaptcha.execute('6Lfw-dwsAAAAACc6y5K4sfFnplSqbskYPia1ADh5', {action: 'download_test'}); });
        };
    </script>
</body>
</html>
