<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DvWilkerOFC | Staff Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { 
            --neon-pink: #ff2d55; 
            --neon-blue: #00f3ff; 
            --dark-bg: #0d0d0d; 
        }
        body { 
            background-color: #000 !important; 
            color: white; 
            font-family: 'Inter', sans-serif; 
            display: none; 
        }
        .glass { 
            background: rgba(22, 22, 37, 0.8); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.05); 
        }
        .input-dark { 
            background: rgba(0,0,0,0.5); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
            font-size: 13px; 
        }
        .btn-filter { 
            padding: 10px; 
            border-radius: 12px; 
            font-size: 10px; 
            font-weight: 900; 
            text-transform: uppercase; 
            border: 1px solid rgba(255,255,255,0.05); 
            transition: 0.3s; 
        }
        .btn-filter.active { 
            border-color: var(--neon-pink); 
            color: var(--neon-pink); 
            background: rgba(255, 45, 85, 0.05); 
        }
        tr { 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            transition: 0.3s; 
        }
        tr:hover { 
            background: rgba(255,255,255,0.02); 
        }
        .badge-premium { 
            background: rgba(0, 243, 255, 0.1); 
            color: var(--neon-blue); 
            border: 1px solid rgba(0, 243, 255, 0.2); 
        }
        .badge-user { 
            background: rgba(255, 255, 255, 0.05); 
            color: #888; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        .swal2-popup { 
            border-radius: 2.5rem !important; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            padding: 2rem !important; 
        }
        .swal-label { 
            text-align: left; 
            text-transform: uppercase; 
            font-weight: 900; 
            font-size: 10px; 
            color: #666; 
            display: block; 
            margin-bottom: 4px; 
            margin-left: 4px; 
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="p-4 border-b border-white/5 flex justify-between items-center sticky top-0 bg-[#0d0d0d] z-50">
        <div class="font-bold text-xl uppercase tracking-tighter">DvWilkerOFC <span style="color: var(--neon-pink);">STAFF</span></div>
        <button onclick="location.href='/dash'" class="text-sm bg-white/10 px-4 py-2 rounded-xl hover:bg-white/20 transition">
            <i class="fas fa-arrow-left mr-2"></i> Volver
        </button>
    </header>

    <main class="container mx-auto p-4 flex-grow max-w-5xl">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 mt-4">
            <div class="glass p-6 rounded-2xl flex justify-between items-center" style="border-left: 4px solid var(--neon-pink);">
                <div>
                    <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest">Base de Datos</p>
                    <h3 id="total-count" class="text-3xl font-black text-white mt-1">0 Usuarios</h3>
                </div>
                <div class="p-4 rounded-xl" style="background: var(--neon-pink); opacity: 0.2;"><i class="fas fa-users text-white text-xl"></i></div>
            </div>

            <div class="glass p-6 rounded-2xl flex flex-col justify-between" style="border-left: 4px solid var(--neon-blue);">
                <div>
                    <p class="text-[10px] text-gray-400 uppercase font-black tracking-widest mb-2">Motor de Temas Global</p>
                    <select id="theme-selector" class="input-dark w-full p-2.5 rounded-xl outline-none font-bold text-xs uppercase tracking-wider"></select>
                </div>
                <button onclick="confirmThemeChange()" class="mt-3 text-[10px] font-black uppercase tracking-wider py-2 rounded-xl transition-all w-full" style="background: rgba(0, 243, 255, 0.1); color: var(--neon-blue); border: 1px solid rgba(0, 243, 255, 0.2);">
                    <i class="fas fa-save mr-1"></i> Guardar Cambio
                </button>
            </div>
        </div>

        <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-6">
            <div class="grid grid-cols-3 gap-2 flex-grow md:max-w-md">
                <button onclick="filterUsers('all')" id="btn-all" class="btn-filter active">TODOS</button>
                <button onclick="filterUsers('premium')" id="btn-premium" class="btn-filter">PREMIUMS</button>
                <button onclick="filterUsers('admin')" id="btn-admin" class="btn-filter">ADMINS</button>
            </div>

            <div class="relative flex-grow md:max-w-xs">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none">
                    <i class="fas fa-search text-gray-500 text-xs"></i>
                </span>
                <input type="text" id="search-input" oninput="handleSearch()" class="input-dark w-full pl-9 pr-4 py-2.5 rounded-xl outline-none" placeholder="Buscar por nombre o correo...">
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-white/5 text-[10px] uppercase tracking-widest text-gray-500">
                        <tr>
                            <th class="p-5 font-black">Usuario / Email</th>
                            <th class="p-5 font-black">Rango</th>
                            <th class="p-5 font-black">Consumo</th>
                            <th class="p-5 text-center font-black">Gestión</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body" class="text-sm">
                        <tr><td colspan="4" class="p-10 text-center text-gray-500 font-black animate-pulse uppercase">Cargando Protocolos...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        let allUsers = [];
        let currentFilter = 'all';
        const SUPER_ADMIN = "frasesbebor@gmail.com";

        if (!userData || userData.role !== 'admin') {
            window.location.href = '/dash';
        } else {
            document.body.style.display = 'block';
            loadUsers();
            loadThemes();
        }

        async function loadUsers() {
            try {
                const res = await fetch(`/api/auth/admin/all?apiKey=${userData.key}`);
                const data = await res.json();
                if (data.status) {
                    allUsers = data.users.sort((a, b) => {
                        const nameA = (a.username || "").toLowerCase();
                        const nameB = (b.username || "").toLowerCase();
                        return nameA.localeCompare(nameB);
                    });
                    document.getElementById('total-count').innerText = `${allUsers.length} Usuarios`;
                    applyFilterAndSearch();
                }
            } catch (e) { console.error(e); }
        }

        async function loadThemes() {
            try {
                const res = await fetch(`/api/auth/admin/themes?apiKey=${userData.key}`);
                const data = await res.json();
                if (data.status) {
                    const selector = document.getElementById('theme-selector');
                    let activeTheme = data.active || localStorage.getItem('kazuma_active_theme') || 'default';
                    selector.innerHTML = data.themes.map(t => {
                        const isCurrent = t === activeTheme;
                        return `<option value="${t}" ${isCurrent ? 'selected' : ''}>${t}</option>`;
                    }).join('');
                    if (activeTheme !== 'default') {
                        injectThemeStyles(activeTheme);
                    }
                }
            } catch (e) { console.error(e); }
        }

        function injectThemeStyles(themeName) {
            const oldLink = document.getElementById('theme-dynamic-css');
            if (oldLink) oldLink.remove();
            const link = document.createElement('link');
            link.id = 'theme-dynamic-css';
            link.rel = 'stylesheet';
            link.href = `/default.css`; 
            document.head.appendChild(link);
        }

        function renderTable(list) {
            const body = document.getElementById('user-table-body');
            if (list.length === 0) {
                body.innerHTML = `<tr><td colspan="4" class="p-10 text-center text-gray-500 font-black uppercase">Sin coincidencias encontradas</td></tr>`;
                return;
            }
            body.innerHTML = list.map(u => {
                const isMe = u.email === SUPER_ADMIN;
                return `
                <tr class="hover:bg-white/[0.03]">
                    <td class="p-5">
                        <div class="font-black ${isMe ? 'text-pink-500' : 'text-white'} text-sm">${u.username}</div>
                        <div class="text-[10px] text-gray-500 font-mono uppercase">${u.email}</div>
                    </td>
                    <td class="p-5">
                        <span class="text-[9px] font-black px-3 py-1 rounded-lg ${u.role === 'admin' ? 'badge-premium' : 'badge-user'}">
                            ${u.role.toUpperCase()}
                        </span>
                    </td>
                    <td class="p-5 text-xs font-black text-white/70">
                        ${u.requestToday || 0} <span class="text-gray-800">/</span> ${u.limit}
                    </td>
                    <td class="p-5 text-center">
                        ${isMe ? '<i class="fas fa-lock text-gray-800"></i>' : 
                        `<button onclick="openEdit('${u.email}')" class="bg-white/5 hover:text-pink-500 w-10 h-10 rounded-xl transition-all border border-white/5"><i class="fas fa-user-cog text-xs"></i></button>`}
                    </td>
                </tr>`;
            }).join('');
        }

        function filterUsers(type) {
            currentFilter = type;
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            applyFilterAndSearch();
        }

        function handleSearch() {
            applyFilterAndSearch();
        }

        function applyFilterAndSearch() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            let filtered = allUsers;
            if (currentFilter !== 'all') {
                filtered = filtered.filter(u => u.role === currentFilter);
            }
            if (query !== '') {
                filtered = filtered.filter(u => 
                    (u.username && u.username.toLowerCase().includes(query)) || 
                    (u.email && u.email.toLowerCase().includes(query))
                );
            }
            renderTable(filtered);
        }

        async function confirmThemeChange() {
            const selectedTheme = document.getElementById('theme-selector').value;
            const confirm = await Swal.fire({
                title: '<span style="color: var(--neon-blue); font-weight:900; letter-spacing:-1px;">¿CONFIRMAR CAMBIO?</span>',
                text: `¿Estás seguro de que deseas aplicar el tema "${selectedTheme}" a toda la API?`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: 'var(--neon-blue)',
                cancelButtonColor: '#333',
                confirmButtonText: 'SÍ, CONFIRMAR',
                cancelButtonText: 'CANCELAR',
                background: '#161625',
                color: '#fff',
                customClass: {
                    confirmButton: 'rounded-2xl font-black px-6 py-4 text-black',
                    cancelButton: 'rounded-2xl font-black'
                }
            });
            if (confirm.isConfirmed) {
                try {
                    const res = await fetch('/api/auth/admin/theme/set', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ apiKey: userData.key, themeName: selectedTheme })
                    });
                    const data = await res.json();
                    if (data.status) {
                        localStorage.setItem('kazuma_active_theme', selectedTheme);
                        Swal.fire({ icon: 'success', title: 'Tema Aplicado Exitosamente', background: '#161625', color: '#fff', showConfirmButton: false, timer: 1500 });
                        setTimeout(() => { location.reload(); }, 1200);
                    } else {
                        Swal.fire({ icon: 'error', title: 'Error', text: data.message, background: '#161625', color: '#fff' });
                    }
                } catch (e) {
                    Swal.fire({ icon: 'error', title: 'Error interno', text: 'No se pudo procesar la solicitud.', background: '#161625', color: '#fff' });
                }
            }
        }

        async function openEdit(email) {
            const u = allUsers.find(user => user.email === email);
            const { value: formValues, isDenied } = await Swal.fire({
                title: '<span style="color: var(--neon-pink); font-weight:900; letter-spacing:-1px;">GESTIÓN STAFF</span>',
                background: '#161625',
                color: '#fff',
                width: '450px',
                html: `
                    <div style="text-align:left; margin-top:10px;">
                        <span class="swal-label">Nombre de Usuario</span>
                        <input id="swal-user" class="input-dark w-full p-3 rounded-xl mb-4 outline-none" value="${u.username}">
                        
                        <span class="swal-label">Correo Electrónico</span>
                        <input id="swal-email" class="input-dark w-full p-3 rounded-xl mb-4 outline-none" value="${u.email}">

                        <span class="swal-label">Contraseña de Acceso</span>
                        <input id="swal-pass" class="input-dark w-full p-3 rounded-xl mb-4 outline-none" value="${u.password}">

                        <span class="swal-label">Llave Maestra (API KEY)</span>
                        <input id="swal-key" class="input-dark w-full p-3 rounded-xl mb-4 outline-none font-mono text-cyan-400" value="${u.key}">

                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <span class="swal-label">Rango</span>
                                <select id="swal-role" class="input-dark w-full p-3 rounded-xl outline-none">
                                    <option value="user" ${u.role === 'user' ? 'selected' : ''}>USER</option>
                                    <option value="premium" ${u.role === 'premium' ? 'selected' : ''}>PREMIUM</option>
                                    <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>ADMIN</option>
                                </select>
                            </div>
                            <div>
                                <span class="swal-label">Límite Diario</span>
                                <input id="swal-limit" type="number" class="input-dark w-full p-3 rounded-xl outline-none" value="${u.limit}">
                            </div>
                        </div>
                    </div>
                `,
                showCancelButton: true,
                showDenyButton: true,
                confirmButtonText: 'GUARDAR CAMBIOS',
                denyButtonText: 'ELIMINAR CUENTA',
                confirmButtonColor: 'var(--neon-pink)',
                denyButtonColor: '#333',
                customClass: {
                    confirmButton: 'rounded-2xl font-black px-6 py-4',
                    denyButton: 'rounded-2xl font-black text-[10px]'
                }
            });
            if (formValues) {
                const newData = {
                    username: document.getElementById('swal-user').value,
                    email: document.getElementById('swal-email').value,
                    password: document.getElementById('swal-pass').value,
                    key: document.getElementById('swal-key').value,
                    role: document.getElementById('swal-role').value,
                    limit: parseInt(document.getElementById('swal-limit').value),
                    plan: document.getElementById('swal-role').value === 'user' ? 'free' : 'premium'
                };
                updateUser(email, newData);
            } else if (isDenied) {
                deleteUser(email);
            }
        }

        async function updateUser(email, newData) {
            const res = await fetch('/api/auth/admin/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminKey: userData.key, targetEmail: email, newData })
            });
            if (res.ok) {
                Swal.fire({ icon: 'success', title: 'Protocolo Actualizado', background: '#161625', color: '#fff', showConfirmButton: false, timer: 1000 });
                loadUsers();
            }
        }

        async function deleteUser(email) {
            const confirm = await Swal.fire({
                title: '¿ELIMINAR?',
                text: "Esta acción es irreversible.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: 'var(--neon-pink)',
                background: '#161625',
                color: '#fff'
            });
            if (confirm.isConfirmed) {
                const res = await fetch('/api/auth/admin/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ adminKey: userData.key, targetEmail: email })
                });
                if (res.ok) loadUsers();
            }
        }
    </script>
</body>
</html>
