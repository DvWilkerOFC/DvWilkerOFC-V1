<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel | Kazuma</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-blue: #00f3ff; --dark-bg: #0d0d0d; --card-bg: #161625; }
        body { background: var(--dark-bg); color: white; font-family: 'Inter', sans-serif; display: none; }
        .glass { background: var(--card-bg); border: 1px solid rgba(0, 243, 255, 0.1); }
        .btn-filter { padding: 10px; border-radius: 12px; font-size: 10px; font-weight: 900; uppercase; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .btn-filter.active { border-color: var(--neon-blue); color: var(--neon-blue); background: rgba(0,243,255,0.05); }
        .user-card { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .input-edit { background: #080810; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px; border-radius: 8px; width: 100%; margin-bottom: 10px; font-size: 13px; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <a href="/dash" class="text-xs font-black uppercase tracking-widest text-slate-500 hover:text-white transition">
                <i class="fas fa-chevron-left mr-2"></i> Volver
            </a>
            <h1 class="text-xl font-black uppercase tracking-tighter">KZM <span style="color:var(--neon-blue)">ADMIN</span></h1>
        </header>

        <div class="grid grid-cols-3 gap-2 mb-6">
            <button onclick="filterUsers('all')" id="btn-all" class="btn-filter active">TODOS</button>
            <button onclick="filterUsers('premium')" id="btn-premium" class="btn-filter">PREMIUMS</button>
            <button onclick="filterUsers('admin')" id="btn-admin" class="btn-filter">ADMINS</button>
        </div>

        <div class="glass rounded-3xl overflow-hidden" id="user-container">
            <div class="p-10 text-center text-slate-500 uppercase font-black text-xs">Cargando base de datos...</div>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        let allUsers = [];

        if (!userData || userData.role !== 'admin') {
            window.location.href = '/dash';
        } else {
            document.body.style.display = 'block';
            loadUsers();
        }

        async function loadUsers() {
            const res = await fetch(`/api/auth/admin/all?apiKey=${userData.key}`);
            const data = await res.json();
            if (data.status) {
                allUsers = data.users;
                renderUsers(allUsers);
            }
        }

        function renderUsers(list) {
            const container = document.getElementById('user-container');
            container.innerHTML = '';
            list.forEach(u => {
                const isMe = u.email === 'frasesbebor@gmail.com';
                container.innerHTML += `
                    <div class="user-card">
                        <div>
                            <div class="font-bold text-sm">${u.username} ${isMe ? '<i class="fas fa-check-circle text-blue-400 ml-1"></i>' : ''}</div>
                            <div class="text-[10px] text-slate-500">${u.email}</div>
                        </div>
                        ${isMe ? 
                            '<i class="fas fa-lock text-slate-600 mr-2"></i>' : 
                            `<button onclick="openEdit('${u.email}')" class="text-cyan-400 p-2"><i class="fas fa-cog"></i></button>`
                        }
                    </div>
                `;
            });
        }

        function filterUsers(type) {
            document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${type}`).classList.add('active');
            if (type === 'all') renderUsers(allUsers);
            else renderUsers(allUsers.filter(u => u.role === type || u.plan === type));
        }

        async function openEdit(email) {
            const u = allUsers.find(user => user.email === email);
            const { value: formValues } = await Swal.fire({
                title: 'EDITAR PROTOCOLO',
                background: '#161625',
                color: '#fff',
                html: `
                    <input id="swal-user" class="input-edit" value="${u.username}" placeholder="Username">
                    <input id="swal-pass" class="input-edit" value="${u.password}" placeholder="Password">
                    <select id="swal-role" class="input-edit">
                        <option value="user" ${u.role === 'user' ? 'selected' : ''}>USER</option>
                        <option value="premium" ${u.role === 'premium' ? 'selected' : ''}>PREMIUM</option>
                        <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>ADMIN</option>
                    </select>
                    <input id="swal-limit" class="input-edit" type="number" value="${u.limit}" placeholder="Límite">
                `,
                showCancelButton: true,
                showDenyButton: true,
                confirmButtonText: 'GUARDAR',
                denyButtonText: 'ELIMINAR',
                confirmButtonColor: '#00f3ff',
                denyButtonColor: '#ff4b4b'
            });

            if (formValues) {
                const newData = {
                    username: document.getElementById('swal-user').value,
                    password: document.getElementById('swal-pass').value,
                    role: document.getElementById('swal-role').value,
                    limit: parseInt(document.getElementById('swal-limit').value),
                    plan: document.getElementById('swal-role').value === 'user' ? 'free' : 'premium'
                };
                updateUser(email, newData);
            } else if (Swal.getDenyButton() && Swal.isDenied) {
                deleteUser(email);
            }
        }

        async function updateUser(email, newData) {
            const res = await fetch('/api/auth/admin/update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminKey: userData.key, targetEmail: email, newData })
            });
            if (res.ok) loadUsers();
        }

        async function deleteUser(email) {
            const res = await fetch('/api/auth/admin/delete', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ adminKey: userData.key, targetEmail: email })
            });
            if (res.ok) loadUsers();
        }
    </script>
</body>
</html>
