<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | Kazuma API</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --neon-blue: #00f3ff; --dark-bg: #0d0d0d; --card-bg: #161616; --sidebar-bg: #121212; --text-main: #ffffff; --text-muted: #a0a0a0; }
        body { background: var(--dark-bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: none; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(0, 243, 255, 0.1); border-top: 3px solid var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        header { background: var(--sidebar-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); position: sticky; top: 0; z-index: 1000; }
        .hero-section { text-align: center; padding: 20px 0; }
        .hero-img { width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--neon-blue); margin-bottom: 10px; }
        .container { padding: 20px; max-width: 800px; margin: 0 auto; }
        .bash-box { background: var(--card-bg); border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); padding: 20px; margin-bottom: 25px; }
        .bash-title { color: var(--neon-blue); font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .stat-line { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 0.9rem; }
        .stat-line span:last-child { color: var(--neon-blue); font-family: 'Courier New', monospace; }
        .user-item { display: flex; align-items: center; gap: 15px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .avatar { width: 35px; height: 35px; background: var(--neon-blue); color: #000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
        .sidebar { position: fixed; top: 0; right: -100%; width: 80%; max-width: 300px; height: 100%; background: var(--sidebar-bg); transition: 0.3s; z-index: 2000; padding: 30px 20px; }
        .sidebar.active { right: 0; }
        .sidebar-link { display: flex; align-items: center; gap: 15px; color: var(--text-main); text-decoration: none; padding: 12px; border-radius: 10px; margin-bottom: 5px; font-size: 0.9rem; background: rgba(255,255,255,0.03); }
        .cat-name { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; margin: 15px 0 10px 5px; display: block; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 1500; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 15px; color: var(--neon-blue); letter-spacing: 2px;">CARGANDO API...</p>
    </div>

    <header>
        <div style="font-weight: 800; font-size: 1rem;">KAZUMA DASH</div>
        <div onclick="toggleMenu()" style="cursor:pointer; font-size: 1.3rem;"><i class="fas fa-bars"></i></div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div style="text-align: right; margin-bottom: 10px;" onclick="toggleMenu()"><i class="fas fa-times"></i></div>
        
        <span class="cat-name">Navegación</span>
        <a href="/" class="sidebar-link"><i class="fas fa-home"></i> Inicio</a>
        <a href="/profile" class="sidebar-link"><i class="fas fa-user-circle"></i> Perfil</a>
        <div id="admin-btn" style="display: none;">
            <a href="/admin" class="sidebar-link" style="border: 1px solid var(--neon-blue);"><i class="fas fa-user-shield"></i> Panel Admin</a>
        </div>

        <span class="cat-name">Servicios API</span>
        <a href="/endpoints/download" class="sidebar-link"><i class="fas fa-download"></i> Descargas</a>
        <a href="/endpoints/search" class="sidebar-link"><i class="fas fa-search"></i> Búsquedas</a>
        <a href="/endpoints/tools" class="sidebar-link"><i class="fas fa-tools"></i> Herramientas</a>
        <a href="/endpoints/ai" class="sidebar-link"><i class="fas fa-robot"></i> Inteligencia Artificial</a>

        <a href="#" onclick="logout()" class="sidebar-link" style="margin-top: 20px; color: #ff4b4b;"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
    </nav>

    <div class="container">
        <div class="hero-section">
            <img src="https://upload.yotsuba.giize.com/u/oco-1ZRU.jpg" class="hero-img">
            <h2 id="welcome-user" style="margin: 0;">Bienvenido</h2>
        </div>

        <div class="bash-box">
            <span class="bash-title">Información de la Plataforma</span>
            <div class="stat-line"><span>Total Usuarios:</span> <span id="total-users">0</span></div>
            <div class="stat-line"><span>Total Solicitudes:</span> <span id="total-reqs">0</span></div>
            <div class="stat-line"><span>Server Uptime:</span> <span id="uptime">00:00:00</span></div>
        </div>

        <div class="bash-box">
            <span class="bash-title">Top 5 Usuarios Globales</span>
            <div id="top-users-list"></div>
        </div>
    </div>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) { window.location.href = '/login'; }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function logout() {
            localStorage.removeItem('kazuma_user');
            window.location.href = '/login';
        }

        function updateUptime(startTime) {
            setInterval(() => {
                const now = Date.now();
                const diff = Math.floor((now - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                document.getElementById('uptime').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function loadDash() {
            document.getElementById('welcome-user').innerText = `Hola, ${userData.username}`;
            if (userData.role === 'admin') { document.getElementById('admin-btn').style.display = 'block'; }

            try {
                const res = await fetch('/api/auth/dashboard-global');
                const data = await res.json();
                
                document.getElementById('total-users').innerText = data.totalUsers;
                document.getElementById('total-reqs').innerText = data.globalRequests;
                updateUptime(data.uptime);

                const topList = document.getElementById('top-users-list');
                data.top5.forEach(u => {
                    topList.innerHTML += `
                        <div class="user-item">
                            <div class="avatar">${u.initial}</div>
                            <div style="flex-grow:1">${u.username}</div>
                            <div style="color:var(--neon-blue)">${u.total}</div>
                        </div>`;
                });
            } catch (e) { console.error("Error cargando datos"); }

            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.body.style.display = 'block';
            }, 2000);
        }

        loadDash();
    </script>
</body>
</html>
