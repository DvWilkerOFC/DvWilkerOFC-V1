<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* DISEÑO TOMADO FIELMENTE DEL CÓDIGO PROPORCIONADO */
        :root { --neon-pink: #ff2d55; --neon-blue: #00f3ff; --dark-bg: #0d0d0d; --card-bg: #161625; --sidebar-bg: #121212; --text-main: #ffffff; --text-muted: #a0a0a0; --code-bg: #212135; }
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.5s ease; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(0, 243, 255, 0.1); border-top: 3px solid var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 15px var(--neon-blue); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        header { background-color: var(--sidebar-bg); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 1000; }
        .brand { font-weight: 800; font-size: 1.1rem; letter-spacing: 1px; cursor: pointer; }
        .brand span { color: var(--neon-pink); }
        
        .sidebar { position: fixed; top: 0; right: -100%; width: 85%; max-width: 300px; height: 100%; background: var(--sidebar-bg); transition: 0.3s ease-in-out; z-index: 2000; padding: 30px 20px; box-sizing: border-box; overflow-y: auto; }
        .sidebar.active { right: 0; }
        .sidebar-link { display: flex; align-items: center; gap: 15px; color: var(--text-main); text-decoration: none; padding: 14px; border-radius: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.03); cursor: pointer; font-size: 0.9rem; font-weight: 600; }
        .nav-category { color: var(--neon-blue); font-size: 0.7rem; font-weight: 900; text-transform: uppercase; margin: 25px 0 10px 5px; letter-spacing: 1.5px; }
        
        .container { width: 100%; max-width: 800px; margin: 0 auto; padding: 20px; box-sizing: border-box; flex-grow: 1; }
        .hero { text-align: center; padding: 30px 10px; }
        .hero-img { width: 110px; height: 110px; border-radius: 50%; border: 3px solid var(--neon-pink); margin-bottom: 15px; object-fit: cover; box-shadow: 0 0 20px rgba(255, 45, 85, 0.3); }
        
        .api-card { background: var(--card-bg); border-radius: 24px; padding: 25px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { background: var(--code-bg); padding: 15px; border-radius: 18px; border-left: 4px solid var(--neon-blue); position: relative; }
        .stat-label { font-size: 0.6rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: 900; color: var(--text-main); font-family: 'monospace'; }
        
        .key-box { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); margin-top: 10px; }
        .key-box span { font-family: 'monospace'; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 70%; }
        
        .user-card { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.03); padding: 12px 15px; border-radius: 18px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .user-reqs { font-weight: 800; color: var(--neon-blue); font-size: 0.75rem; background: rgba(0,243,255,0.1); padding: 5px 12px; border-radius: 10px; }
        
        .footer { text-align: center; padding: 25px 20px; color: var(--text-muted); font-size: 0.7rem; font-weight: 600; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 1500; backdrop-filter: blur(4px); }
        .overlay.active { display: block; }
    </style>
</head>
<body>
    <div id="preloader"><div class="spinner"></div></div>
    
    <header>
        <div class="brand" onclick="location.href='/dash'">KAZUMA <span>DASH</span></div>
        <div class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div style="text-align: right; margin-bottom: 20px;" onclick="toggleMenu()"><i class="fas fa-times"></i></div>
        <div id="admin-nav" style="display:none;">
            <p class="nav-category">Staff Control</p>
            <div class="sidebar-link" style="border-left: 4px solid #fbbf24;" onclick="location.href='/admin'"><i class="fas fa-user-shield"></i> Panel Admin</div>
        </div>
        <p class="nav-category">Menú Principal</p>
        <div class="sidebar-link" onclick="toggleMenu()"><i class="fas fa-th-large"></i> Dashboard</div>
        <div class="sidebar-link" onclick="location.href='/profile'"><i class="fas fa-user-circle"></i> Mi Perfil</div>
        <p class="nav-category">Servicios API</p>
        <div class="sidebar-link" onclick="location.href='/endpoints/ai'"><i class="fas fa-robot"></i> Inteligencia Artificial</div>
        <div class="sidebar-link" onclick="location.href='/endpoints/download'"><i class="fas fa-cloud-download-alt"></i> Descargas</div>
        <div class="sidebar-link" style="margin-top:30px; background: rgba(255,45,85,0.1); color:var(--neon-pink);" onclick="logout()"><i class="fas fa-power-off"></i> Cerrar Sesión</div>
    </nav>

    <div class="container" id="content-area">
        </div>

    <footer class="footer">
        <p>Copyright © 2026 API Kazuma. All rights reserved.</p>
    </footer>

    <script>
        // LÓGICA ADAPTADA AL NUEVO BACKEND
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) window.location.href = '/login';

        function toggleMenu() { 
            document.getElementById('sidebar').classList.toggle('active'); 
            document.getElementById('overlay').classList.toggle('active'); 
        }

        function logout() { 
            localStorage.clear(); 
            window.location.href = '/login'; 
        }

        function copyKey() { 
            navigator.clipboard.writeText(userData.key); 
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'API KEY Copiada', showConfirmButton: false, timer: 2000, background: '#161625', color: '#fff' }); 
        }

        function toggleEye() { 
            const el = document.getElementById('key-display'); 
            el.innerText = el.innerText.includes('••••') ? userData.key : '••••••••••••••••'; 
        }

        function updateUptime(startTime) {
            setInterval(() => {
                const now = Date.now();
                const diff = Math.floor((now - startTime) / 1000);
                const h = Math.floor(diff / 3600).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600) / 60).toString().padStart(2, '0');
                const s = (diff % 60).toString().padStart(2, '0');
                if(document.getElementById('uptime-val')) {
                    document.getElementById('uptime-val').innerText = `${h}:${m}:${s}`;
                }
            }, 1000);
        }

        async function loadDash() {
            const area = document.getElementById('content-area');
            const pre = document.getElementById('preloader');
            
            if (userData.role === 'admin') document.getElementById('admin-nav').style.display = 'block';

            try {
                // Llamada a tu endpoint de dashboard-global
                const res = await fetch('/api/auth/dashboard-global');
                const dataGlobal = await res.json();

                area.innerHTML = `
                <section class="hero">
                    <img src="https://upload.yotsuba.giize.com/u/oco-1ZRU.jpg" class="hero-img">
                    <h1 style="font-weight:900; margin:0">SISTEMA <span style="color:var(--neon-pink)">ACTIVO</span></h1>
                    <p style="color:var(--text-muted); font-size: 0.8rem; font-weight:700; margin-top:5px;">USUARIO: ${userData.username.toUpperCase()}</p>
                </section>

                <div class="api-card">
                    <p class="nav-category" style="margin-top:0; color:var(--neon-blue)"><i class="fas fa-key"></i> Mi API Key</p>
                    <div class="key-box">
                        <span id="key-display">••••••••••••••••</span>
                        <div>
                            <i class="fas fa-eye" onclick="toggleEye()" style="cursor:pointer; margin-right:15px; color:var(--text-muted)"></i>
                            <i class="fas fa-copy" onclick="copyKey()" style="cursor:pointer; color:var(--neon-blue)"></i>
                        </div>
                    </div>
                </div>

                <div class="api-card">
                    <p class="nav-category" style="margin-top:0; color:var(--neon-blue)">Información de Plataforma</p>
                    <div class="stats-grid">
                        <div class="stat-box" style="grid-column: span 2;">
                            <div class="stat-label">Usuarios Totales</div>
                            <div class="stat-value">${dataGlobal.totalUsers}</div>
                        </div>
                        <div class="stat-box">
                            <div class="stat-label">Server Uptime</div>
                            <div class="stat-value" id="uptime-val" style="color:var(--neon-pink)">00:00:00</div>
                        </div>
                        <div class="stat-box" style="border-left-color: var(--neon-pink);">
                            <div class="stat-label">Tu Límite Diario</div>
                            <div class="stat-value">${userData.limit}</div>
                        </div>
                    </div>
                </div>

                <div class="api-card">
                    <p class="nav-category" style="margin-top:0; color:var(--neon-blue)">Top 5 Usuarios Globales</p>
                    ${dataGlobal.top5.map((u, i) => `
                        <div class="user-card">
                            <span style="font-size:0.9rem; font-weight:700">#${i+1} ${u.username}</span>
                            <span class="user-reqs">${u.total} reqs</span>
                        </div>
                    `).join('')}
                </div>`;

                updateUptime(dataGlobal.uptime);

            } catch (e) { 
                area.innerHTML = "<p style='text-align:center; padding:50px;'>Error al conectar con la API Kurayami.</p>"; 
            }

            // Quitar preloader
            setTimeout(() => { 
                pre.style.opacity = '0'; 
                setTimeout(() => { pre.style.display = 'none'; }, 500); 
            }, 1000);
        }

        window.onload = loadDash;
    </script>
</body>
</html>
