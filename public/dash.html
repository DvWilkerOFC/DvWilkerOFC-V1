<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kazuma | Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --neon-pink: #ff2d55; 
            --neon-blue: #00f3ff; 
            --dark-bg: #09090b; 
            --card-bg: #11111d; 
            --sidebar-bg: #0c0c14; 
            --text-main: #ffffff; 
            --text-muted: #8e8e93; 
        }
        
        body { background-color: var(--dark-bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }

        #preloader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--dark-bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
        .spinner { width: 50px; height: 50px; border: 3px solid rgba(0, 243, 255, 0.1); border-top: 3px solid var(--neon-blue); border-radius: 50%; animation: spin 1s linear infinite; box-shadow: 0 0 15px var(--neon-blue); }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        header { background: rgba(12, 12, 20, 0.9); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); position: sticky; top: 0; z-index: 1000; }
        .brand { font-weight: 900; font-size: 1.2rem; letter-spacing: 1px; }
        .brand span { color: var(--neon-pink); }

        .container { width: 100%; padding: 15px; box-sizing: border-box; flex-grow: 1; }
        .hero { text-align: center; padding: 25px 0; }
        .hero-img { width: 120px; height: 120px; border-radius: 50%; border: 3px solid var(--neon-pink); margin-bottom: 15px; object-fit: cover; box-shadow: 0 0 25px rgba(255, 45, 85, 0.5); }
        .hero h1 { font-size: 1.8rem; font-weight: 900; margin: 0; text-transform: uppercase; }

        .api-card { background: var(--card-bg); border-radius: 28px; padding: 22px; margin-bottom: 18px; border: 1px solid rgba(255,255,255,0.05); }
        .nav-category { color: var(--neon-blue); font-size: 0.75rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; letter-spacing: 1px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .stat-box { background: rgba(33, 33, 53, 0.4); padding: 18px; border-radius: 20px; border-left: 4px solid var(--neon-blue); position: relative; overflow: hidden; }
        .stat-box i { position: absolute; right: 10px; bottom: 10px; font-size: 1.8rem; opacity: 0.1; }
        .stat-label { font-size: 0.65rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .stat-value { font-size: 1.15rem; font-weight: 900; font-family: 'JetBrains Mono', monospace; }

        /* KEY BOX */
        .key-box { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.4); padding: 18px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); }
        .key-box span { font-family: 'monospace'; font-size: 0.85rem; }

        /* TOP USERS - ESTILO "ENCENDIDO" */
        .user-card { 
            display: flex; align-items: center; justify-content: space-between; 
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 0%, rgba(0,243,255,0.02) 100%);
            padding: 12px 15px; border-radius: 20px; margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { 
            width: 35px; height: 35px; border-radius: 12px; 
            background: var(--neon-blue); color: #000; 
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 1rem;
            box-shadow: 0 0 10px var(--neon-blue);
        }
        .user-reqs { 
            font-weight: 900; color: var(--neon-blue); font-size: 0.75rem; 
            background: rgba(0,243,255,0.1); padding: 6px 12px; border-radius: 12px;
            border: 1px solid rgba(0,243,255,0.2);
        }

        .sidebar { position: fixed; top: 0; right: -100%; width: 85%; max-width: 320px; height: 100%; background: var(--sidebar-bg); transition: 0.3s ease; z-index: 2000; padding: 35px 20px; box-sizing: border-box; }
        .sidebar.active { right: 0; }
        .sidebar-link { display: flex; align-items: center; gap: 15px; color: #fff; text-decoration: none; padding: 14px; border-radius: 15px; margin-bottom: 8px; background: rgba(255,255,255,0.03); font-weight: 600; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; z-index: 1500; backdrop-filter: blur(5px); }
        .overlay.active { display: block; }

        .footer { text-align: center; padding: 25px; color: var(--text-muted); font-size: 0.7rem; font-weight: 700; }
    </style>
</head>
<body>
    <div id="preloader"><div class="spinner"></div></div>
    
    <header>
        <div class="brand">KAZUMA <span>DASH</span></div>
        <div onclick="toggleMenu()" style="font-size: 1.4rem; color: var(--neon-blue); cursor: pointer;"><i class="fas fa-bars-staggered"></i></div>
    </header>

    <div class="overlay" id="overlay" onclick="toggleMenu()"></div>

    <nav class="sidebar" id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <span style="font-weight: 900; color: var(--neon-pink);">KAZUMA PROTOCOL</span>
            <i class="fas fa-times" onclick="toggleMenu()" style="font-size: 1.5rem;"></i>
        </div>
        <p class="nav-category">Servicios</p>
        <a href="/endpoints/search" class="sidebar-link"><i class="fas fa-search"></i> Search</a>
        <a href="/endpoints/tools" class="sidebar-link"><i class="fas fa-tools"></i> Tools</a>
        <a href="/endpoints/download" class="sidebar-link"><i class="fas fa-download"></i> Downloads</a>
        <a href="/endpoints/ai" class="sidebar-link"><i class="fas fa-robot"></i> Inteligencia IA</a>
        <div class="sidebar-link" style="margin-top:40px; background: rgba(255,45,85,0.1); color:var(--neon-pink);" onclick="logout()"><i class="fas fa-power-off"></i> Salir</div>
    </nav>

    <div class="container" id="content-area"></div>

    <footer class="footer">
        <p>© 2026 KAZUMA API • PROTOCOLO KURAYAMI</p>
    </footer>

    <script>
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        if (!userData) window.location.href = '/login';

        function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }
        function logout() { localStorage.clear(); window.location.href = '/login'; }
        function copyKey() { navigator.clipboard.writeText(userData.key); Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copiado', showConfirmButton: false, timer: 1500, background: '#11111d', color: '#fff' }); }
        function toggleEye() { const el = document.getElementById('key-display'); el.innerText = el.innerText.includes('••••') ? userData.key : '••••••••••••••••'; }

        async function loadDash() {
            const area = document.getElementById('content-area');
            try {
                const res = await fetch('/api/auth/dashboard-global');
                const data = await res.json();

                // Calcular total global de solicitudes sumando el top5 + un estimado o lo que envíe el back
                // Si tu backend envía un campo 'globalRequests', úsalo aquí:
                const totalGlobalReqs = data.totalRequests || "Cargando...";

                area.innerHTML = `
                <section class="hero">
                    <img src="https://upload.yotsuba.giize.com/u/oco-1ZRU.jpg" class="hero-img">
                    <h1>SISTEMA <span style="color:var(--neon-pink)">ACTIVO</span></h1>
                    <p style="color:var(--text-muted); font-size: 0.85rem; font-weight:800; margin-top:8px;">USUARIO: ${userData.username.toUpperCase()}</p>
                </section>

                <div class="api-card">
                    <p class="nav-category"><i class="fas fa-key"></i> Mi Credencial</p>
                    <div class="key-box">
                        <span id="key-display">••••••••••••••••</span>
                        <div style="display:flex; gap:15px">
                            <i class="fas fa-eye" onclick="toggleEye()"></i>
                            <i class="fas fa-copy" onclick="copyKey()" style="color:var(--neon-blue)"></i>
                        </div>
                    </div>
                </div>

                <div class="api-card">
                    <p class="nav-category"><i class="fas fa-database"></i> Información de Plataforma</p>
                    <div class="stats-grid">
                        <div class="stat-box" style="grid-column: span 2; border-left-color: #fbbf24;">
                            <i class="fas fa-globe"></i>
                            <div class="stat-label">Solicitudes Totales (Global)</div>
                            <div class="stat-value" style="color:#fbbf24">${totalGlobalReqs} REQS</div>
                        </div>
                        <div class="stat-box">
                            <i class="fas fa-users"></i>
                            <div class="stat-label">Usuarios</div>
                            <div class="stat-value">${data.totalUsers}</div>
                        </div>
                        <div class="stat-box">
                            <i class="fas fa-bolt"></i>
                            <div class="stat-label">Tu Límite</div>
                            <div class="stat-value">${userData.limit}</div>
                        </div>
                    </div>
                </div>

                <div class="api-card">
                    <p class="nav-category"><i class="fas fa-fire"></i> Top Usuarios</p>
                    ${data.top5.map((u, i) => `
                        <div class="user-card">
                            <div class="user-info">
                                <div class="user-avatar" style="background:${i==0?'#fbbf24':''}; box-shadow:${i==0?'0 0 15px #fbbf24':''}">
                                    ${u.username.charAt(0).toUpperCase()}
                                </div>
                                <span style="font-weight:800; font-size:0.9rem">${u.username}</span>
                            </div>
                            <span class="user-reqs">${u.total} reqs</span>
                        </div>
                    `).join('')}
                </div>`;
            } catch (e) { area.innerHTML = "Error de enlace."; }
            document.getElementById('preloader').style.display = 'none';
        }
        window.onload = loadDash;
    </script>
</body>
</html>
