<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://quge5.com/88/tag.min.js" data-zone="248457" async data-cfasync="false"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gana USD | DvWilkerOFC Ads</title>
    <style>
        body { 
            background: #0d0e12; color: #f3f4f6; font-family: 'Plus Jakarta Sans', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100vh; text-align: center; overflow: hidden;
            touch-action: manipulation;
        }
        .stats { margin-bottom: 20px; }
        .val { font-size: 2.5rem; font-weight: 800; color: #eab308; }
        .instruccion { color: #9ca3af; font-size: 0.9rem; padding: 0 20px; }
        .btn-back { 
            background: #3b82f6; border: none; padding: 12px 25px; 
            border-radius: 12px; color: white; font-weight: bold; 
            cursor: pointer; margin-top: 30px; 
        }
    </style>
</head>
<body>

    <div class="stats">
        <div style="font-size: 0.8rem; text-transform: uppercase;">USD Ganados aquí</div>
        <div id="ads-usd" class="val">0 USD</div>
    </div>

    <p class="instruccion">Toca cualquier parte de la pantalla para sumar 1 USD por clic mientras ves los anuncios.</p>

    <button class="btn-back" onclick="window.location.href='/game/clicker'">Volver al juego</button>

    <script>
        // Obtenemos datos si existen, si no, usamos un valor anónimo para evitar errores
        const userData = JSON.parse(localStorage.getItem('kazuma_user'));
        const userEmail = userData ? (userData.email || (userData.data && userData.data.email)) : 'anonimo@dvwilkerofc.com';

        let usdAds = 0;

        document.body.addEventListener('click', async () => {
            usdAds++;
            document.getElementById('ads-usd').innerText = `${usdAds} USD`;

            try {
                await fetch('/api/juego/click', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
            } catch (e) {
                console.error("Error sumando USD:", e);
            }
        });
    </script>
</body>
</html>
